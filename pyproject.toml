[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hermesoptimizer"
version = "0.1.0"
description = "Local routing and analysis scaffold for Hermes logs and provider catalogs"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Hermes"}]
dependencies = ["PyYAML>=6.0"]

[project.scripts]
hermesoptimizer = "hermesoptimizer.run_standalone:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
addopts = "-q"
