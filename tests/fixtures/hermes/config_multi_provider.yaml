version: "1.0"
providers:
  openai_primary:
    base_url: https://api.openai.com/v1
    auth_type: bearer
    auth_key_env: OPENAI_API_KEY
    model: gpt-4o
    lane: coding
  openai_fallback:
    base_url: https://api.openai.com/v1
    auth_type: bearer
    auth_key_env: OPENAI_API_KEY
    model: gpt-4o-mini
    lane: coding
  anthropic_primary:
    base_url: https://api.anthropic.com
    auth_type: bearer
    auth_key_env: ANTHROPIC_API_KEY
    model: claude-3-5-sonnet-20241022
    lane: reasoning
  anthropic_fallback:
    base_url: https://api.anthropic.com
    auth_type: bearer
    auth_key_env: ANTHROPIC_API_KEY
    model: claude-3-5-haiku-20241022
    lane: reasoning
gateway:
  enabled: true
  port: 8080
  health_check_path: /health
  fallback_routes: "coding:openai_primary>openai_fallback,reasoning:anthropic_primary>anthropic_fallback"
log:
  level: info
  path: ~/.hermes/logs
session:
  path: ~/.hermes/sessions
  max_age_days: 30
cache:
  path: ~/.hermes/cache
database:
  path: ~/.hermes/state.db
