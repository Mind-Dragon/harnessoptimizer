# Channel promotion workflow: dev -> beta -> release
# Triggered manually via workflow_dispatch or automatically on push to dev/beta
#
# Promotion is one-way: dev -> beta -> release
# Each stage requires green tests before advancing
# All branch advancement is fast-forward only

name: Channel Promotion Pipeline

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Target channel (dev|beta|release)'
        required: true
        type: choice
        options:
          - dev
          - beta
          - release
      dry_run:
        description: 'Dry run (skip actual promotion)'
        required: false
        type: boolean
        default: false

  push:
    branches:
      - dev
      - beta

env:
  HERMES_VERSION: "0.9.1"

jobs:
  # ─── Stage 0: Pre-flight ────────────────────────────────────────────────────
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      current_channel: ${{ steps.detect.outputs.channel }}
      can_promote: ${{ steps.detect.outputs.can_promote }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        name: Detect current branch and promotion eligibility
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "current_branch=$BRANCH" >> $GITHUB_OUTPUT
          
          case "$BRANCH" in
            dev)   ALLOWED="beta" ;;
            beta)  ALLOWED="release" ;;
            *)     ALLOWED="" ;;
          esac
          
          if [[ "$ALLOWED" != "" ]]; then
            echo "channel=$BRANCH" >> $GITHUB_OUTPUT
            echo "can_promote=true" >> $GITHUB_OUTPUT
            echo "target_channel=$ALLOWED" >> $GITHUB_OUTPUT
          else
            echo "channel=$BRANCH (no promotion path)" >> $GITHUB_OUTPUT
            echo "can_promote=false" >> $GITHUB_OUTPUT
            echo "target_channel=" >> $GITHUB_OUTPUT
          fi

  # ─── Stage 1: Test gate ─────────────────────────────────────────────────────
  test-gate:
    name: Test gate
    needs: preflight
    if: needs.preflight.outputs.can_promote == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-asyncio

      - name: Run dev -> beta smoke gate
        if: needs.preflight.outputs.current_channel == 'dev' && needs.preflight.outputs.target_channel == 'beta'
        run: python -m pytest tests/test_extensions_sync.py tests/test_extensions_loader.py tests/test_extensions_schema.py -v --tb=short

      - name: Run beta -> release full suite gate
        if: needs.preflight.outputs.current_channel == 'beta' && needs.preflight.outputs.target_channel == 'release'
        run: python -m pytest -q

  # ─── Stage 2: Install integrity canary ─────────────────────────────────────
  install-canary:
    name: Install integrity canary
    needs: preflight
    if: needs.preflight.outputs.can_promote == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package
        run: |
          pip install -e .
          hermesoptimizer --version

      - name: Run doctor check
        run: |
          python -c "
          from hermesoptimizer.extensions.doctor import run_doctor
          report = run_doctor(dry_run=True)
          issues = report.get('issues', [])
          if issues:
              print('DOCTOR ISSUES:', issues)
              exit(1)
          print('Doctor: ALL CLEAR')
          print(f'Extensions checked: {report[\"extensions_checked\"]}')
          print(f'Healthy: {report[\"healthy\"]}')
          "

  # ─── Stage 3: Promote (manual or via dry-run) ────────────────────────────────
  promote:
    name: Promote to ${{ needs.preflight.outputs.target_channel || 'N/A' }}
    needs: [preflight, test-gate, install-canary]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Report status
        run: |
          echo "Current channel: ${{ needs.preflight.outputs.current_channel }}"
          echo "Target channel:  ${{ needs.preflight.outputs.target_channel }}"
          echo "Tests passed:    ${{ needs.test-gate.result == 'success' }}"
          echo "Canary passed:   ${{ needs.install-canary.result == 'success' }}"
          
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "DRY RUN — no promotion performed"
            exit 0
          fi

      - name: Create promotion artifact
        if: needs.preflight.outputs.can_promote == 'true'
        run: |
          TARGET="${{ needs.preflight.outputs.target_channel }}"
          mkdir -p promotion-artifacts
          echo "promotion_timestamp=$(date -u +%Y%m%dT%H%M%SZ)" >> promotion-artifacts/env
          echo "source_channel=${{ needs.preflight.outputs.current_channel }}" >> promotion-artifacts/env
          echo "target_channel=$TARGET" >> promotion-artifacts/env
          echo "version=$HERMES_VERSION" >> promotion-artifacts/env
          echo "HERMES ${{ needs.preflight.outputs.current_channel }} -> $TARGET" > promotion-artifacts/NOTES.txt
          cat promotion-artifacts/env

      - name: Simulate branch advancement (dev->beta, beta->release)
        if: |
          needs.preflight.outputs.can_promote == 'true' &&
          github.event.inputs.dry_run != 'true'
        run: |
          TARGET="${{ needs.preflight.outputs.target_channel }}"
          # In a real promotion this would be:
          # git checkout $TARGET && git merge --ff-only ${{ needs.preflight.outputs.current_channel }}
          # For now, document the intent
          echo "PROMOTION SIMULATED: ${{ needs.preflight.outputs.current_channel }} -> $TARGET"
          echo "This would run: git checkout $TARGET && git merge --ff-only ${{ needs.preflight.outputs.current_channel }}"

  # ─── Release gate (final only) ─────────────────────────────────────────────
  release-gate:
    name: Release gate
    needs: [preflight, promote]
    if: |
      needs.preflight.outputs.target_channel == 'release' &&
      needs.preflight.outputs.can_promote == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Final integrity check
        run: |
          echo "=== RELEASE CANDIDATE for v$HERMES_VERSION ==="
          echo "All promotion gates passed."
          echo "Channel: release"
          echo ""
          echo "To finalize: tag and push"
          echo "  git tag v$HERMES_VERSION"
          echo "  git push origin release --tags"
